services:
  postgres:
    image: postgres:16
    container_name: ollive-postgres
    environment:
      POSTGRES_USER: ollive
      POSTGRES_PASSWORD: ollive123
      POSTGRES_DB: ollive_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ollive -d ollive_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ollive-backend
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      POSTGRES_USER: ollive
      POSTGRES_PASSWORD: ollive123
      POSTGRES_DB: ollive_db
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      USE_SQLITE: false
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - BACKEND_URL=http://ollive-backend:8000
    container_name: ollive-frontend
    environment:
      BACKEND_URL: http://ollive-backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: